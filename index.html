<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>EKA AI</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='16' fill='%23C9A84C'/><text x='50%' y='55%' dominant-baseline='middle' text-anchor='middle' font-size='18' fill='%230C0608' font-family='serif'>✦</text></svg>">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Rajdhani:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="dark">

  <!-- Particle canvas background -->
  <canvas id="bgCanvas"></canvas>

  <div class="app">

    <!-- ═══ SIDEBAR ═══ -->
    <aside class="sidebar" id="sidebar">

      <!-- Brand -->
      <div class="brand">
        <div class="brand-emblem">
          <div class="emblem-ring r1"></div>
          <div class="emblem-ring r2"></div>
          <div class="emblem-core">✦</div>
        </div>
        <div class="brand-text">
          <h1>EKA</h1>
          <p class="brand-sub">AI Assistant</p>
        </div>
      </div>

      <!-- Status pill -->
      <div class="status-pill">
        <span class="status-dot"></span>
        <span id="modelLabel">Llama 4 · Online</span>
      </div>

      <!-- Quick actions -->
      <div class="section-label">Quick Ask</div>
      <div class="quick-actions">
        <button class="chip" data-q="What is artificial intelligence?">What is AI?</button>
        <button class="chip" data-q="Tell me about yourself">About EKA</button>
        <button class="chip" data-q="What can you help me with?">Your abilities</button>
        <button class="chip" data-q="Who created you?">Who built you?</button>
        <button class="chip" data-q="Tell me something interesting">Surprise me ✦</button>
        <button class="chip" data-q="Write a short poem about the stars">Write a poem</button>
      </div>

      <!-- Chat History -->
      <div class="section-label">History</div>
      <div class="history-wrap">
        <ul id="historyList"></ul>
        <p class="history-empty" id="historyEmpty">No conversations yet</p>
      </div>

      <!-- Actions -->
      <div class="sidebar-actions">
        <button id="clearHistory" class="action-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.96"/></svg>
          Clear History
        </button>
        <button id="clearChat" class="action-btn danger">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
          Clear Chat
        </button>
      </div>

      <div class="credits">
        <span>© 2026 EKA AI</span>
        <span class="india-badge">🇮🇳 Made in India</span>
      </div>
    </aside>

    <!-- ═══ MAIN CHAT ═══ -->
    <main class="chat-area">

      <!-- Listening glow ring -->
      <div id="listeningAnimation" class="listening-animation" style="display:none">
        <div class="glow-ring">
          <div class="ripple"></div>
          <div class="ripple r2"></div>
          <div class="ripple r3"></div>
        </div>
      </div>

      <!-- Header -->
      <header class="chat-header">
        <div class="header-left">
          <!-- Mobile sidebar toggle -->
          <button class="icon-btn sidebar-toggle" id="sidebarToggle" title="Menu">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <div class="header-avatar">
            <div class="ha-emblem">✦</div>
          </div>
          <div>
            <div class="header-name">EKA</div>
            <div class="header-status" id="headerStatus">
              <span class="hstatus-dot"></span> Ready
            </div>
          </div>
        </div>

        <div class="header-actions">
          <!-- Web Search Toggle -->
          <button id="webToggle" class="icon-btn" title="Web Search (OFF)" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 0 20M12 2a15.3 15.3 0 0 0 0 20"/>
            </svg>
          </button>

          <!-- Mute Toggle -->
          <button id="muteToggle" class="icon-btn" title="Mute voice" aria-pressed="false">
            <svg id="muteIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
              <path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/>
            </svg>
          </button>

          <!-- Voice only -->
          <button id="voiceOnlyToggle" class="icon-btn" title="Voice-only mode" aria-pressed="false">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>

          <!-- Language -->
          <select id="languageToggle" title="Language" class="lang-select">
            <option value="auto">Auto</option>
            <option value="en">English</option>
            <option value="hi">हिंदी</option>
          </select>

          <!-- Theme -->
          <button id="themeToggle" class="icon-btn" title="Toggle theme">
            <svg id="themeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="5"/>
              <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
              <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
              <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
              <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
            </svg>
          </button>
        </div>
      </header>

      <!-- Voice-only wake button -->
      <button id="wakeMicButton" class="wake-mic" title="Tap to speak" style="display:none">
        <div class="wake-pulse"></div>
        <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
          <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
          <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
        </svg>
      </button>

      <!-- Chat messages -->
      <section id="chat" class="chat"></section>

      <!-- Composer -->
      <div class="composer-wrap">
        <div class="composer" id="composer">
          <button id="mic" class="mic-btn" title="Voice input">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/>
            </svg>
          </button>
          <span id="mic-status" class="mic-status"></span>
          <input id="msg" type="text" placeholder="Ask EKA anything…" autocomplete="off" />
          <button id="send" class="send-btn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </button>
        </div>
        <div class="composer-hint">Press Enter to send · Voice search available · Made in India 🇮🇳</div>
      </div>

    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
